<!DOCTYPE html>
<html lang="th" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JP Visual & Docs</title>

  <!-- ตั้งธีมก่อนโหลด React เพื่อลด FOUC -->
  <script>
    try {
      const theme = localStorage.getItem("theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

      if (theme === "dark" || (!theme && prefersDark)) {
        document.documentElement.classList.add("dark");
        document.documentElement.setAttribute("data-theme", "dark");
      } else {
        document.documentElement.classList.remove("dark");
        document.documentElement.setAttribute("data-theme", "light");
      }
    } catch (e) {
      document.documentElement.classList.remove("dark");
      document.documentElement.setAttribute("data-theme", "light");
    }
  </script>

  <!-- Google Fonts: Kanit และ Orbitron -->
  <link
    href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&family=Orbitron:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <!-- Favicon -->
  <link rel="icon" href="/src/assets/jp-logo.png" />

  <!-- CSS จาก Vite + Tailwind -->
  <link rel="stylesheet" href="/src/index.css" />

  <!-- SEO Meta Tags -->
  <meta
    name="description"
    content="บริการยื่นกู้ วีซ่า เอกสาร การเงิน โปรไฟล์ ระบบหลังบ้าน โดย JP Visual & Docs"
  />
  <meta name="author" content="JP Visual & Docs" />

  <!-- Open Graph -->
  <meta property="og:title" content="JP Visual & Docs" />
  <meta
    property="og:description"
    content="บริการยื่นกู้ วีซ่า เอกสาร การเงิน โปรไฟล์ ระบบหลังบ้าน"
  />
  <meta property="og:image" content="/src/assets/repository-open-graph-template.png" />
  <meta property="og:type" content="website" />

  <!-- Theme color for mobile browsers -->
  <meta name="theme-color" content="#1A237E" />

  <!-- ปรับให้โหลดฟอนต์เร็วขึ้น -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body
  class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-kanit transition-colors duration-500"
>
  <div id="root"></div>

  <!-- React + Vite Inject -->
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
